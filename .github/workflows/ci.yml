name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changeset:
    # Standard guardrail: every PR must consciously decide the release question.
    # `changeset status` fails when a publishable package changed without a
    # changeset; if the change needs no release, add an empty one
    # (`pnpm changeset add --empty`). Runs only on PRs — pushes to main consume
    # changesets via the release workflow's "Version Packages" PR.
    name: Changeset
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin main:refs/remotes/origin/main

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Skipped on the Changesets "Version Packages" PR, which consumes the
      # changeset files (so the gate would otherwise fail and block releases).
      # The job still runs and reports success, satisfying the required check.
      - name: Require a changeset (or an explicit empty one)
        if: github.head_ref != 'changeset-release/main'
        run: pnpm changeset status --since=origin/main

  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Workspace packages resolve each other through dist/ (exports point at
      # built artifacts), so everything below needs a build on a clean runner.
      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Release package checks
        run: pnpm check:release-packages

      - name: Sentiness fast check
        run: pnpm sentiness check --tier=fast --compact
